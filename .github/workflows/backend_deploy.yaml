name: Deploy Backend

on:
  workflow_run:
    workflows: [Upstream Sync]
    types: [completed]
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v3
        name: Install pnpm
        id: pnpm-install
        with:
          version: 8
          run_install: false

      - name: Deploy Backend for ${{ github.ref_name }}
        run: |
          export use_worker_assets=${{ secrets.USE_WORKER_ASSETS }}
          export use_worker_assets_with_telegram=${{ secrets.USE_WORKER_ASSETS_WITH_TELEGRAM }}
          if [ -n "$use_worker_assets" ]; then
            cd frontend/
            pnpm install --no-frozen-lockfile
            if [ -n "$use_worker_assets_with_telegram" ]; then
              echo "Building with telegram pages"
              pnpm build:telegram:pages
            else
              echo "Building with normal pages"
              pnpm build:pages
            fi
            cd ..
          fi

          export debug_mode=${{ secrets.DEBUG_MODE }}
          export use_mail_wasm_parser=${{ secrets.BACKEND_USE_MAIL_WASM_PARSER }}
          cd worker/

          # 使用 heredoc 安全写入 wrangler.toml（避免 Shell 解析导致引号丢失）
          cat > wrangler.toml << 'EOF'
          ${{ secrets.BACKEND_TOML }}
          EOF
          echo "wrangler.toml written (length: $(wc -c < wrangler.toml) bytes)"

          # 可选调试：显示前几行检查引号是否存在（确认后可删除）
          echo "First 5 lines of wrangler.toml:"
          head -5 wrangler.toml

          pnpm install --no-frozen-lockfile

          # diagnostic: enable wrangler debug logs and check authentication (non-fatal)
          export WRANGLER_LOG=debug
          echo "Running wrangler whoami..."
          npx wrangler whoami || true

          if [ -n "$use_mail_wasm_parser" ]; then
            echo "Using mail-parser-wasm-worker"
            pnpm add mail-parser-wasm-worker
            git apply ../.github/config/mail-parser-wasm-worker.patch
            echo "Applied mail-parser-wasm-worker patch"
          fi

          if [ "$debug_mode" = "true" ]; then
            # show full logs directly for debugging
            pnpm run deploy
          else
            # run and print output if failure
            output=$(pnpm run deploy 2>&1)
            code=$?
            echo "$output"
            if [ $code -ne 0 ]; then
              echo "pnpm run deploy failed with exit code $code"
              exit $code
            fi
          fi
          echo "Deployed for tag ${{ github.ref_name }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
